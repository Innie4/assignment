<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resteranteur — Contact</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;color:#222}
    header,footer{background:#0b6;color:#003}
    .container{width:90%;max-width:800px;margin:0 auto;padding:1rem}
    nav ul{list-style:none;padding:0;display:flex;gap:1rem;margin:0}
    nav a{color:inherit;text-decoration:none}
    form{display:grid;gap:.75rem}
    label{font-weight:600}
    input,textarea{padding:.5rem;border:1px solid #ccc;border-radius:4px;width:100%}
    button{background:#036;color:#fff;padding:.6rem 1rem;border:0;border-radius:4px}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">Resteranteur</div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Please fill out the form and we'll get back to you shortly.</p>
    <form action="#" method="post">
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>
      <div>
        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text">
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>
      <div>
        <button type="submit">Send Message</button>
      </div>
    </form>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Resteranteur</p>
    </div>
  </footer>
</body>
</html>
