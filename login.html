<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Gourmet Bistro</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <a href="index.html" class="material-symbols-outlined"
            style="color: inherit; text-decoration: none;">arrow_back_ios</a>
        <h2 style="font-size: 1.125rem; font-weight: 700; flex: 1; text-align: center; margin-right: 2rem;">Sign In</h2>
    </header>

    <main class="login-main">
        <div class="login-card">
            <div class="card-header">
                <div class="logo-circle">
                    <span class="material-symbols-outlined" style="font-size: 40px;">restaurant</span>
                </div>
                <h1>Welcome Back</h1>
                <p>Your table and favorites are waiting.</p>
            </div>

            <div class="form-group">
                <label>Email or Username</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="text" placeholder="name@example.com">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" placeholder="••••••••">
                    <span class="material-symbols-outlined"
                        style="left: auto; right: 1rem; cursor: pointer;">visibility</span>
                </div>
            </div>

            <div class="extra-row">
                <label class="check-group">
                    <input type="checkbox">
                    <span>Remember me</span>
                </label>
                <a href="#" style="color: var(--primary); font-weight: 600; text-decoration: none;">Forgot password?</a>
            </div>

            <button class="btn-login">Sign In</button>

            <div class="divider">or continue with</div>

            <div class="social-grid">
                <button class="social-btn">
                    <span class="material-symbols-outlined">ios</span>
                    <span>Apple</span>
                </button>
                <button class="social-btn">
                    <span class="material-symbols-outlined" style="color: #ea4335;">google</span>
                    <span>Google</span>
                </button>
            </div>
        </div>

        <div class="footer-cta">
            <p>New here? <a href="register.html">Create an account</a></p>
        </div>
    </main>
</body>

</html>
