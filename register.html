<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Gourmet Bistro</title>
    <link rel="stylesheet" href="css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <a href="index.html" class="material-symbols-outlined"
            style="color: inherit; text-decoration: none;">arrow_back_ios</a>
        <h2>Join Our Table</h2>
        <div style="width: 48px;"></div>
    </header>

    <main class="auth-main">
        <div class="progress-bar">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>

        <div class="headline">
            <h3>Create Your Account</h3>
            <p>Discover culinary excellence with us.</p>
        </div>

        <div class="form-card">
            <div class="form-row">
                <div class="input-field">
                    <label>First Name</label>
                    <input type="text" placeholder="John">
                </div>
                <div class="input-field">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe">
                </div>
            </div>

            <div class="input-field">
                <label>Email Address</label>
                <input type="email" placeholder="example@email.com">
            </div>

            <div class="input-field">
                <label>Phone Number</label>
                <input type="tel" placeholder="+1 (555) 000-0000">
            </div>

            <div class="input-field">
                <label>Password</label>
                <div class="pass-container">
                    <input type="password" placeholder="Min. 8 characters">
                    <span class="material-symbols-outlined eye-icon">visibility</span>
                </div>
                <div class="strength-meter">
                    <div class="meter-bar filled"></div>
                    <div class="meter-bar filled"></div>
                    <div class="meter-bar"></div>
                    <div class="meter-bar"></div>
                </div>
                <p class="meter-label">Security: Medium</p>
            </div>

            <div class="terms-row">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the <span style="color: var(--primary); font-weight: 600;">Terms &
                        Conditions</span> and <span style="color: var(--primary); font-weight: 600;">Privacy
                        Policy</span>.</label>
            </div>

            <button class="btn-auth">Create Account</button>
        </div>

        <p class="footer-link">Already have an account? <a href="login.html">Log in</a></p>
    </main>
</body>

</html>
