<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev Mini-Tasks Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Web Dev Challenge</h1>
            <p>Select a number to reveal your mini-task. You have 15 minutes!</p>
        </header>

        <div class="grid" id="taskGrid">
            <!-- 30 numbers will be generated here -->
        </div>
    </main>

    <!-- Name Input Modal -->
    <div id="nameModal" class="modal">
        <div class="modal-content glass">
            <h2>Enter Your Name</h2>
            <p>To start the challenge, please provide your name.</p>
            <input type="text" id="userName" placeholder="Your Name" autocomplete="off">
            <button id="startBtn" class="btn-primary">Start Challenge</button>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modalTaskTitle">Task Title</h2>
                <div id="timerDisplay" class="timer">15:00</div>
            </div>
            <div class="modal-body">
                <div id="taskDescription"></div>
                <div class="task-meta">
                    <span id="taskTopic" class="badge">Topic</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="closeTaskBtn" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Time Elapsed Alert -->
    <div id="timeAlert" class="time-alert-overlay">
        <div class="time-alert-box glass">
            <h1>TIME ELAPSED!</h1>
            <p>Your 18 minutes (15 + 3 overtime) are up.</p>
            <button onclick="location.reload()" class="btn-primary">Try Another Task</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
